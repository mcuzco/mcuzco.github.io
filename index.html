<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realidad Aumentada Profesional</title>
  <!-- Fuentes y librerías -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe-environment-component/1.3.1/aframe-environment-component.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ar.js/2.0.8/aframe-ar.min.js"></script>
  <!-- Variables y estilos profesionales -->
  <style>
    :root {
      --bg-color: #111;
      --overlay-bg: rgba(0, 0, 0, 0.6);
      --primary-color: #1e90ff;
      --accent-color: #ff6f61;
      --text-color: #f0f0f0;
      --transition-speed: 0.3s;
      --control-bg: rgba(30, 30, 30, 0.8);
      --control-radius: 6px;
    }
    * { box-sizing: border-box; transition: all var(--transition-speed) ease; }
    body {
      margin: 0; overflow: hidden;
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    /* Preloader */
    #preloader {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg-color);
      display: flex; justify-content: center; align-items: center;
      z-index: 20;
    }
    .spinner {
      border: 5px solid rgba(255,255,255,0.1);
      border-top: 5px solid var(--primary-color);
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin-loader 1s linear infinite;
    }
    @keyframes spin-loader { to { transform: rotate(360deg); } }
    /* UI Overlay */
    .ui-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; padding: 1rem 2rem;
      background: var(--overlay-bg);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .ui-overlay .logo {
      height: 36px; width: auto;
    }
    .ui-overlay h1 {
      margin: 0; font-weight: 500;
      font-size: 1.5rem; letter-spacing: 1px;
    }
    .ui-overlay .instructions {
      font-weight: 300; font-size: 0.9rem; opacity: 0.8;
    }
    /* Control Panel */
    .control-panel {
      position: absolute; bottom: 1rem; left: 1rem;
      background: var(--control-bg);
      border-radius: var(--control-radius); padding: 0.5rem;
      display: flex; gap: 0.5rem; align-items: center;
      z-index: 10;
    }
    .control-panel label {
      font-size: 0.85rem; margin-right: 0.4rem;
    }
    .control-panel select, .control-panel button {
      background: #222; color: var(--text-color);
      border: none; border-radius: var(--control-radius);
      padding: 0.4rem 0.8rem; font-size: 0.85rem;
      cursor: pointer;
    }
    .control-panel select:hover, .control-panel button:hover { opacity: 0.9; }
    /* A-Frame entities */
    a-scene { visibility: hidden; }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div id="preloader"><div class="spinner"></div></div>
  <!-- UI Overlay -->
  <div class="ui-overlay">
    <h1>AR Avanzada</h1>
    <div class="instructions">Apunta al marcador <strong>HIRO</strong> para iniciar</div>
  </div>
  <!-- Control Panel -->
  <div class="control-panel">
    <label for="shape-select">Forma:</label>
    <select id="shape-select">
      <option value="box">Cubo</option>
      <option value="sphere">Esfera</option>
      <option value="torus">Toro</option>
    </select>
    <button id="toggle-shadows">Sombras</button>
    <button id="toggle-animation">Animar</button>
  </div>
  <!-- Escena AR -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- Entorno ligero -->
    <a-entity environment="preset: forest; groundColor: #444; skyColor: #222; fog: 0.5;"></a-entity>
    <a-entity light="type: ambient; intensity: 0.6; color: #ccc"></a-entity>
    <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 3 1"></a-entity>
    <!-- Marcador y modelo dinámico -->
    <a-marker preset="hiro">
      <a-entity id="dynamic-model" position="0 0.5 0" shadow="cast: true; receive: true"
                geometry="primitive: box; depth:0.6; height:0.6; width:0.6"
                material="shader: standard; color: var(--primary-color); metalness:0.3; roughness:0.7">
      </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  <!-- Interactividad -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const preloader = document.getElementById('preloader');
      const scene = document.querySelector('a-scene');
      const model = document.getElementById('dynamic-model');
      const shapeSelect = document.getElementById('shape-select');
      let shadowsOn = true, animOn = false;
      
      // Iniciar escena tras carga
      setTimeout(() => {
        preloader.style.display = 'none';
        scene.style.visibility = 'visible';
      }, 1200);
      
      // Cambiar forma
      shapeSelect.onchange = () => {
        const proto = shapeSelect.value;
        model.setAttribute('geometry', `primitive: ${proto};`);
      };
      // Toggle sombras
      document.getElementById('toggle-shadows').onclick = () => {
        shadowsOn = !shadowsOn;
        model.setAttribute('shadow', `cast: ${shadowsOn}; receive: ${shadowsOn}`);
      };
      // Toggle animación
      document.getElementById('toggle-animation').onclick = () => {
        if (animOn) {
          model.removeAttribute('animation');
        } else {
          model.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear');
        }
        animOn = !animOn;
      };
    });
  </script>
</body>
</html>
